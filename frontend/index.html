<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SuperKaraoke</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body class="h-full min-h-screen">

<div
  x-data="initApp()"
  x-init="init()"
  class="min-h-screen flex flex-col"
>

  <!-- ── Top nav ─────────────────────────────────────────────────────────── -->
  <header class="sticky top-0 z-30 border-b border-gray-200 dark:border-gray-800 bg-white/90 dark:bg-gray-950/90 backdrop-blur-sm">
    <div class="max-w-6xl mx-auto px-4 h-14 flex items-center gap-3">
      <span class="text-xl">🎤</span>
      <span class="font-bold text-lg tracking-tight text-brand-600 dark:text-brand-400">SuperKaraoke</span>

      <nav class="hidden sm:flex items-center gap-1 ml-4">
        <a href="/"        class="btn-ghost text-sm font-medium">Queue</a>
        <a href="/library" class="btn-ghost text-sm font-medium">Library</a>
        <a href="/screen"  class="btn-ghost text-sm font-medium" target="_blank">Screen ↗</a>
      </nav>

      <div class="flex-1"></div>

      <!-- Connection dot -->
      <span
        :class="connected ? 'bg-green-500' : 'bg-amber-400'"
        class="w-2 h-2 rounded-full"
        :title="connected ? 'Live' : 'Reconnecting...'"
      ></span>

      <!-- Dark mode toggle -->
      <button @click="toggleTheme()" class="btn-ghost p-2 rounded-lg" :title="darkMode ? 'Light mode' : 'Dark mode'">
        <template x-if="darkMode">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
          </svg>
        </template>
        <template x-if="!darkMode">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
          </svg>
        </template>
      </button>
    </div>
  </header>

  <main class="flex-1 max-w-6xl mx-auto w-full px-4 py-6 flex flex-col gap-6">

    <!-- ── Now playing banner ───────────────────────────────────────────── -->
    <template x-if="nowPlaying">
      <div class="card px-4 py-3 flex items-center gap-3 bg-brand-50 dark:bg-brand-950 border-brand-200 dark:border-brand-800">
        <span class="text-2xl">🎵</span>
        <div class="flex-1 min-w-0">
          <p class="text-xs text-brand-600 dark:text-brand-400 uppercase tracking-widest font-medium">Now Playing</p>
          <p class="font-semibold truncate" x-text="nowPlaying.song?.title || nowPlaying.title"></p>
          <p class="text-sm text-gray-500 dark:text-gray-400" x-text="'Requested by ' + (nowPlaying.user || nowPlaying.song?.user || '')"></p>
        </div>
        <button @click="skip()" class="btn-ghost text-xs text-red-500 hover:text-red-700 dark:text-red-400 shrink-0">
          Skip ⏭
        </button>
      </div>
    </template>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

      <!-- ── Left column: search + song grid ─────────────────────────────── -->
      <section class="lg:col-span-2 flex flex-col gap-4">

        <!-- Search bar -->
        <div class="flex gap-2">
          <div class="relative flex-1">
            <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400 pointer-events-none"
              fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M21 21l-4.35-4.35M11 19a8 8 0 100-16 8 8 0 000 16z"/>
            </svg>
            <input
              x-model="query"
              @input="onSearchInput()"
              type="search"
              placeholder="Search songs…"
              class="input pl-9"
            />
          </div>
          <select x-model="sort" @change="onSortChange()" class="input w-auto">
            <option value="title">A–Z</option>
            <option value="likes">Most Liked</option>
          </select>
        </div>

        <!-- Results count -->
        <div x-show="query" class="flex items-center justify-between text-sm text-gray-500 dark:text-gray-400">
          <span>
            <span x-text="total"></span> song<span x-show="total !== 1">s</span>
            matching "<span x-text="query"></span>"
          </span>
          <span x-show="loading" class="text-brand-500 animate-pulse">Loading…</span>
        </div>

        <!-- Prompt when no search -->
        <div x-show="!query" class="py-16 text-center text-gray-400 dark:text-gray-600">
          <p class="text-4xl mb-3">🎤</p>
          <p class="font-medium text-gray-500 dark:text-gray-400">Search for a song to get started</p>
          <p class="text-sm mt-1">Type a title or artist name above</p>
        </div>

        <!-- Song cards grid -->
        <div x-show="query" class="grid grid-cols-1 sm:grid-cols-2 gap-3">
          <template x-for="song in songs" :key="song.id">
            <div
              class="card p-3 flex items-center gap-3 group hover:border-brand-300 dark:hover:border-brand-700 transition-colors cursor-pointer"
              @click="openEnqueue(song)"
            >
              <!-- Kind icon -->
              <div class="shrink-0 w-9 h-9 rounded-lg flex items-center justify-center text-lg"
                :class="song.kind === 'cdg' ? 'bg-purple-100 dark:bg-purple-950' : 'bg-blue-100 dark:bg-blue-950'">
                <span x-text="song.kind === 'cdg' ? '🎤' : '🎬'"></span>
              </div>

              <!-- Info -->
              <div class="flex-1 min-w-0">
                <p class="font-medium text-sm truncate leading-snug" x-text="song.title"></p>
                <div class="flex items-center gap-2 mt-0.5">
                  <span x-show="song.artist" class="text-xs text-gray-500 dark:text-gray-400 truncate" x-text="song.artist"></span>
                  <!-- In queue indicator -->
                  <span x-show="isInQueue(song.id)" class="badge badge-purple shrink-0">In Queue</span>
                </div>
              </div>

              <!-- Like button -->
              <button
                @click.stop="toggleLike(song)"
                class="shrink-0 flex items-center gap-1 text-sm text-gray-400 hover:text-pink-500 dark:hover:text-pink-400 transition-colors"
                :class="song.likes > 0 ? 'text-pink-500 dark:text-pink-400' : ''"
              >
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                  <path fill-rule="evenodd"
                    d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z"
                    clip-rule="evenodd"/>
                </svg>
                <span x-show="song.likes > 0" x-text="song.likes" class="tabular-nums"></span>
              </button>
            </div>
          </template>

          <!-- Empty state -->
          <template x-if="!loading && songs.length === 0">
            <div class="sm:col-span-2 py-16 text-center text-gray-400 dark:text-gray-600">
              <p class="text-4xl mb-3">🎵</p>
              <p class="font-medium">No songs found</p>
              <p class="text-sm mt-1">Try a different search term</p>
            </div>
          </template>
        </div>

        <!-- YouTube search CTA -->
        <div x-show="query" class="flex justify-center pt-2">
          <button @click="openYouTube()"
            class="flex items-center gap-2 px-4 py-2 rounded-xl border border-red-200 dark:border-red-900 text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-950/40 text-sm font-medium transition-colors">
            <svg class="w-4 h-4 shrink-0" viewBox="0 0 24 24" fill="currentColor">
              <path d="M23.498 6.186a3.016 3.016 0 00-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 00.502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 002.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 002.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
            </svg>
            Search YouTube for a karaoke version
          </button>
        </div>

        <!-- Pagination -->
        <div x-show="totalPages > 1" class="flex items-center justify-center gap-2 pt-2">
          <button @click="prevPage()" :disabled="page === 0" class="btn-ghost">← Prev</button>
          <span class="text-sm text-gray-500">
            Page <span x-text="page + 1"></span> of <span x-text="totalPages"></span>
          </span>
          <button @click="nextPage()" :disabled="page >= totalPages - 1" class="btn-ghost">Next →</button>
        </div>
      </section>

      <!-- ── Right column: queue ──────────────────────────────────────────── -->
      <aside class="flex flex-col gap-3">
        <div class="flex items-center justify-between">
          <h2 class="font-semibold text-base">Queue</h2>
          <span class="badge badge-purple" x-show="queue.length > 0">
            <span x-text="queue.length"></span> song<span x-show="queue.length !== 1">s</span>
          </span>
        </div>

        <!-- Empty queue -->
        <template x-if="queue.length === 0">
          <div class="card p-6 text-center text-gray-400 dark:text-gray-600">
            <p class="text-2xl mb-2">🎶</p>
            <p class="text-sm">Queue is empty</p>
            <p class="text-xs mt-1">Search for a song and tap to add it</p>
          </div>
        </template>

        <!-- Queue items -->
        <div class="flex flex-col gap-2">
          <template x-for="(entry, idx) in queue" :key="entry.queue_id">
            <div class="card p-3 flex items-center gap-2">
              <!-- Position number -->
              <span class="text-xs font-bold text-gray-400 dark:text-gray-600 w-5 text-center shrink-0"
                x-text="idx + 1"></span>

              <div class="flex-1 min-w-0">
                <p class="text-sm font-medium truncate" x-text="entry.title"></p>
                <p class="text-xs text-gray-500 dark:text-gray-400 truncate" x-text="entry.user"></p>
              </div>

              <!-- Queue controls -->
              <div class="flex items-center gap-0.5 shrink-0">
                <button @click="moveUp(entry.queue_id)" :disabled="idx === 0"
                  class="btn-ghost p-1 text-xs" title="Move up">↑</button>
                <button @click="moveDown(entry.queue_id)" :disabled="idx === queue.length - 1"
                  class="btn-ghost p-1 text-xs" title="Move down">↓</button>
                <button @click="removeFromQueue(entry.queue_id)"
                  class="btn-danger p-1 text-xs" title="Remove">✕</button>
              </div>
            </div>
          </template>
        </div>
      </aside>
    </div>
  </main>

  <!-- ── YouTube modal ─────────────────────────────────────────────────── -->
  <div
    x-show="ytModal"
    x-transition:enter="transition-opacity duration-200"
    x-transition:enter-start="opacity-0"
    x-transition:enter-end="opacity-100"
    x-transition:leave="transition-opacity duration-150"
    x-transition:leave-start="opacity-100"
    x-transition:leave-end="opacity-0"
    class="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-4 bg-black/50 backdrop-blur-sm"
    @click="closeYouTube()"
  >
    <div
      class="card w-full max-w-2xl shadow-2xl flex flex-col max-h-[85vh]"
      x-transition:enter="transition duration-200"
      x-transition:enter-start="opacity-0 translate-y-4 sm:scale-95"
      x-transition:enter-end="opacity-100 translate-y-0 sm:scale-100"
      @click.stop
    >
      <!-- Header -->
      <div class="px-5 pt-5 pb-3 border-b border-gray-200 dark:border-gray-800 shrink-0">
        <div class="flex items-center gap-2 mb-3">
          <svg class="w-5 h-5 text-red-500 shrink-0" viewBox="0 0 24 24" fill="currentColor">
            <path d="M23.498 6.186a3.016 3.016 0 00-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 00.502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 002.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 002.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
          </svg>
          <h2 class="font-semibold text-base">Search YouTube</h2>
          <button @click="closeYouTube()" class="ml-auto btn-ghost p-1 text-gray-400">✕</button>
        </div>
        <div class="flex gap-2">
          <input
            x-model="ytQuery"
            @keyup.enter="ytSearch()"
            type="search"
            placeholder="Search YouTube…"
            class="input flex-1"
          />
          <button @click="ytSearch()" :disabled="ytSearching" class="btn-primary shrink-0">
            <span x-text="ytSearching ? 'Searching…' : 'Search'"></span>
          </button>
        </div>
      </div>

      <!-- Results -->
      <div class="flex-1 overflow-y-auto px-5 py-3 flex flex-col gap-2">

        <!-- Loading -->
        <template x-if="ytSearching">
          <div class="py-12 text-center text-gray-400 animate-pulse">Searching YouTube…</div>
        </template>

        <!-- Error -->
        <template x-if="!ytSearching && ytError">
          <div class="py-12 text-center text-gray-400 dark:text-gray-600">
            <p class="text-2xl mb-2">🔍</p>
            <p x-text="ytError"></p>
          </div>
        </template>

        <!-- Result rows -->
        <template x-for="v in ytResults" :key="v.id">
          <div class="flex items-center gap-3 rounded-xl border border-gray-100 dark:border-gray-800 p-2 hover:border-brand-300 dark:hover:border-brand-700 transition-colors">
            <!-- Thumbnail -->
            <div class="shrink-0 w-28 h-16 rounded-lg overflow-hidden bg-gray-100 dark:bg-gray-800">
              <img :src="v.thumbnail" :alt="v.title" class="w-full h-full object-cover" loading="lazy" />
            </div>
            <!-- Info -->
            <div class="flex-1 min-w-0">
              <p class="text-sm font-medium leading-snug line-clamp-2" x-text="v.title"></p>
              <p class="text-xs text-gray-500 dark:text-gray-400 mt-0.5 truncate">
                <span x-text="v.channel"></span>
                <span x-show="v.duration" class="ml-2 tabular-nums" x-text="v.duration"></span>
              </p>
              <!-- Per-video download status -->
              <template x-for="[jid, job] in Object.entries(ytDownloads).filter(([,j]) => j.title === v.title)" :key="jid">
                <div class="mt-1 flex items-center gap-2">
                  <div class="flex-1 h-1.5 rounded-full bg-gray-200 dark:bg-gray-700 overflow-hidden">
                    <div class="h-full bg-brand-500 transition-all duration-300 rounded-full"
                      :style="`width:${job.progress}%`"></div>
                  </div>
                  <span class="text-xs tabular-nums shrink-0"
                    :class="job.status === 'done' ? 'text-green-500' : job.status === 'error' ? 'text-red-500' : 'text-gray-400'"
                    x-text="job.status === 'done' ? '✓ Done' : job.status === 'error' ? '✕ Error' : job.progress + '%'">
                  </span>
                </div>
              </template>
            </div>
            <!-- Download button -->
            <button
              @click="ytDownload(v)"
              :disabled="Object.values(ytDownloads).some(j => j.title === v.title && j.status !== 'done' && j.status !== 'error')"
              class="shrink-0 btn-primary text-sm px-3 py-1.5 disabled:opacity-40"
            >
              ↓ Download
            </button>
          </div>
        </template>
      </div>

      <!-- Footer note -->
      <div class="px-5 py-3 border-t border-gray-200 dark:border-gray-800 shrink-0 text-xs text-gray-400 dark:text-gray-600">
        Downloads save to <span class="font-mono" x-text="'media/Downloads/'"></span> and appear in the library after rescanning.
      </div>
    </div>
  </div>

  <!-- ── Enqueue modal ──────────────────────────────────────────────────── -->
  <div
    x-show="modal"
    x-transition:enter="transition-opacity duration-200"
    x-transition:enter-start="opacity-0"
    x-transition:enter-end="opacity-100"
    x-transition:leave="transition-opacity duration-150"
    x-transition:leave-start="opacity-100"
    x-transition:leave-end="opacity-0"
    class="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-4 bg-black/50 backdrop-blur-sm"
    @click.self="closeModal()"
  >
    <div
      class="card w-full max-w-sm p-5 shadow-xl"
      x-transition:enter="transition duration-200"
      x-transition:enter-start="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
      x-transition:enter-end="opacity-100 translate-y-0 sm:scale-100"
    >
      <h3 class="font-semibold text-lg mb-1" x-text="modal?.title"></h3>
      <p class="text-sm text-gray-500 dark:text-gray-400 mb-4">Who's singing?</p>

      <input
        x-ref="usernameInput"
        x-model="modalUser"
        @keyup.enter="confirmEnqueue()"
        type="text"
        placeholder="Your name"
        class="input mb-4"
        maxlength="40"
      />

      <div class="flex gap-2">
        <button @click="closeModal()" class="btn-ghost flex-1">Cancel</button>
        <button @click="confirmEnqueue(true)" class="btn-ghost flex-1 text-brand-600 dark:text-brand-400">Play Next</button>
        <button @click="confirmEnqueue()" class="btn-primary flex-1">Add to Queue</button>
      </div>
    </div>
  </div>

  <!-- ── Toast notification ─────────────────────────────────────────────── -->
  <div
    x-show="toast"
    x-transition:enter="transition duration-300"
    x-transition:enter-start="opacity-0 translate-y-2"
    x-transition:enter-end="opacity-100 translate-y-0"
    x-transition:leave="transition duration-200"
    x-transition:leave-start="opacity-100"
    x-transition:leave-end="opacity-0"
    class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 px-4 py-2.5 rounded-xl shadow-lg text-sm font-medium text-white pointer-events-none"
    :class="toast?.type === 'error' ? 'bg-red-600' : 'bg-gray-900 dark:bg-gray-100 dark:text-gray-900'"
    x-text="toast?.msg"
  ></div>

</div>

<script type="module">
  import Alpine from 'alpinejs'
  import { initApp } from './src/main.js'
  window.initApp = initApp
  window.Alpine = Alpine
  Alpine.start()
</script>
</body>
</html>
