<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SuperKaraoke — Screen</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body class="h-full bg-black overflow-hidden">

  <div
    x-data="initScreen()"
    x-init="init()"
    class="relative w-full h-screen flex items-center justify-center bg-black"
  >

    <!-- Main video element -->
    <video
      x-ref="video"
      class="w-full h-full object-contain"
      playsinline
      preload="auto"
    ></video>

    <!-- Idle / splash screen (shown when nothing is playing and not waiting) -->
    <div
      x-show="!nowPlaying && !waitingForNext"
      x-transition:enter="transition-opacity duration-700"
      x-transition:enter-start="opacity-0"
      x-transition:enter-end="opacity-100"
      x-transition:leave="transition-opacity duration-300"
      x-transition:leave-start="opacity-100"
      x-transition:leave-end="opacity-0"
      class="absolute inset-0 flex flex-col items-center justify-center bg-gradient-to-br from-gray-950 via-gray-900 to-brand-950"
    >
      <!-- Logo / Title -->
      <div class="text-center mb-8">
        <div class="text-7xl mb-4">🎤</div>
        <h1 class="text-5xl font-bold text-white tracking-tight">SuperKaraoke</h1>
        <p class="mt-3 text-xl text-gray-400">Scan the QR code or visit this page to add songs</p>
      </div>

      <!-- QR code -->
      <div class="mb-8 flex flex-col items-center gap-3">
        <canvas x-ref="qrCanvas" class="rounded-xl"></canvas>
        <p class="text-sm text-gray-500 font-mono" x-text="$el.ownerDocument.location.origin"></p>
      </div>

      <!-- Up next teaser -->
      <template x-if="upNext">
        <div class="card px-6 py-4 text-center bg-white/5 border-white/10">
          <p class="text-sm text-gray-400 uppercase tracking-widest mb-1">Up Next</p>
          <p class="text-2xl font-semibold text-white" x-text="upNext.title"></p>
          <p class="text-gray-400 mt-0.5" x-text="'— ' + upNext.user"></p>
        </div>
      </template>

      <!-- Queue count badge -->
      <template x-if="queue.length > 0">
        <div class="mt-6">
          <span class="badge badge-purple text-sm px-3 py-1">
            <span x-text="queue.length"></span> song<span x-show="queue.length !== 1">s</span> in queue
          </span>
        </div>
      </template>

      <!-- Connection status -->
      <div class="absolute bottom-6 right-6">
        <span
          :class="connected ? 'bg-green-500' : 'bg-red-500'"
          class="inline-block w-2.5 h-2.5 rounded-full"
          :title="connected ? 'Connected' : 'Reconnecting...'"
        ></span>
      </div>
    </div>

    <!-- Waiting for next song overlay (late-connecting screen) -->
    <div
      x-show="waitingForNext"
      x-transition:enter="transition-opacity duration-700"
      x-transition:enter-start="opacity-0"
      x-transition:enter-end="opacity-100"
      x-transition:leave="transition-opacity duration-300"
      x-transition:leave-start="opacity-100"
      x-transition:leave-end="opacity-0"
      class="absolute inset-0 flex flex-col items-center justify-center bg-gradient-to-br from-gray-950 via-gray-900 to-brand-950"
    >
      <div class="text-center mb-8">
        <div class="text-6xl mb-4 animate-pulse">⏳</div>
        <h2 class="text-4xl font-bold text-white tracking-tight">Waiting for Next Song</h2>
        <p class="mt-3 text-lg text-gray-400">Playback will begin with the next song in the queue</p>
      </div>

      <!-- Currently playing on other screens -->
      <template x-if="currentlyPlaying">
        <div class="card px-6 py-4 text-center bg-white/5 border-white/10 mb-6">
          <p class="text-xs text-gray-400 uppercase tracking-widest mb-1">Now Playing Elsewhere</p>
          <p class="text-2xl font-semibold text-white" x-text="currentlyPlaying?.song?.title || currentlyPlaying?.title"></p>
          <p class="text-gray-400 mt-0.5" x-text="'♪ ' + (currentlyPlaying?.user || '')"></p>
        </div>
      </template>

      <!-- Up next teaser -->
      <template x-if="upNext">
        <div class="card px-6 py-4 text-center bg-white/5 border-white/10">
          <p class="text-sm text-gray-400 uppercase tracking-widest mb-1">Up Next</p>
          <p class="text-2xl font-semibold text-white" x-text="upNext.title"></p>
          <p class="text-gray-400 mt-0.5" x-text="'— ' + upNext.user"></p>
        </div>
      </template>

      <!-- Connection status -->
      <div class="absolute bottom-6 right-6">
        <span
          :class="connected ? 'bg-green-500' : 'bg-red-500'"
          class="inline-block w-2.5 h-2.5 rounded-full"
          :title="connected ? 'Connected' : 'Reconnecting...'"
        ></span>
      </div>
    </div>

    <!-- Now-playing overlay (shown over the video) -->
    <div
      x-show="nowPlaying"
      class="absolute inset-0 pointer-events-none"
    >
      <!-- Progress bar — bottom edge of screen -->
      <div class="absolute bottom-0 left-0 right-0 h-1 bg-white/10">
        <div
          class="h-full bg-gradient-to-r from-brand-600 to-brand-400 transition-none"
          :style="`width: ${(playProgress * 100).toFixed(2)}%`"
        ></div>
      </div>
      <!-- Top-right: title + user -->
      <div class="absolute top-5 right-5 text-right max-w-xs">
        <div class="bg-black/60 backdrop-blur-sm rounded-xl px-4 py-3">
          <p class="text-xs text-gray-400 uppercase tracking-widest mb-0.5">Now Playing</p>
          <p class="text-white font-semibold leading-snug text-base" x-text="nowPlaying?.song?.title || nowPlaying?.title"></p>
          <p class="text-gray-400 text-sm" x-text="'♪ ' + (nowPlaying?.user || '')"></p>
        </div>
      </div>

      <!-- Bottom-right: up next -->
      <template x-if="upNext">
        <div class="absolute bottom-5 right-5 text-right max-w-xs">
          <div class="bg-black/60 backdrop-blur-sm rounded-xl px-4 py-3">
            <p class="text-xs text-gray-400 uppercase tracking-widest mb-0.5">Up Next</p>
            <p class="text-white text-sm font-medium" x-text="upNext.title"></p>
            <p class="text-gray-400 text-xs" x-text="'— ' + upNext.user"></p>
          </div>
        </div>
      </template>

      <!-- Bottom-left: pitch control -->
      <div class="absolute bottom-5 left-5 pointer-events-auto">
        <div class="bg-black/60 backdrop-blur-sm rounded-xl px-3 py-2 flex items-center gap-2">
          <button
            @click="adjustPitch(-1)"
            :disabled="semitones <= -12"
            class="w-7 h-7 rounded-lg flex items-center justify-center text-white hover:bg-white/20 disabled:opacity-30 transition-colors text-lg leading-none"
            title="Pitch down"
          >♭</button>

          <div class="text-center min-w-[3rem]">
            <p class="text-xs text-gray-400 uppercase tracking-widest leading-none mb-0.5">Key</p>
            <p
              class="text-white font-mono font-semibold text-sm leading-none"
              x-text="semitones === 0 ? '0' : (semitones > 0 ? '+' : '') + semitones"
            ></p>
          </div>

          <button
            @click="adjustPitch(1)"
            :disabled="semitones >= 12"
            class="w-7 h-7 rounded-lg flex items-center justify-center text-white hover:bg-white/20 disabled:opacity-30 transition-colors text-lg leading-none"
            title="Pitch up"
          >♯</button>

          <button
            x-show="semitones !== 0"
            @click="resetPitch()"
            class="ml-1 text-xs text-gray-400 hover:text-white transition-colors"
            title="Reset pitch"
          >↺</button>
        </div>
      </div>
    </div>

    <!-- Tap-to-start overlay (autoplay blocked) -->
    <div
      x-show="needsGesture"
      @click="unlockAndPlay()"
      class="absolute inset-0 flex items-center justify-center bg-black/70 cursor-pointer z-50"
    >
      <div class="text-center px-8">
        <p class="text-6xl mb-4">▶</p>
        <p class="text-white text-3xl font-bold">Tap to Start</p>
        <p class="text-gray-400 text-lg mt-2">Click anywhere to enable audio playback</p>
      </div>
    </div>

    <!-- Generic error overlay -->
    <div
      x-show="error"
      @click="clearError()"
      class="absolute inset-0 flex items-center justify-center bg-black/80 cursor-pointer z-50"
    >
      <div class="text-center px-8">
        <p class="text-5xl mb-4">🔇</p>
        <p class="text-white text-2xl font-semibold" x-text="error"></p>
      </div>
    </div>

  </div>

  <script type="module">
    import Alpine from 'alpinejs'
    import { initScreen } from './src/screen.js'
    window.initScreen = initScreen
    window.Alpine = Alpine
    Alpine.start()
  </script>
</body>
</html>
